<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Algiz Bot</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, sans-serif; background: #f2f2f7; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; padding: 24px; }
  h1 { font-size: 22px; font-weight: 700; color: #1c1c1e; }
  button { width: 100%; max-width: 320px; padding: 18px; border: none; border-radius: 14px; font-size: 17px; font-weight: 600; cursor: pointer; transition: opacity 0.15s; }
  button:active { opacity: 0.7; }
  .card { background: #0a84ff; color: white; }
  .editorial { background: #30d158; color: white; }
  .reset { background: #e5e5ea; color: #636366; font-size: 14px; padding: 12px; }
  #status { font-size: 15px; color: #636366; min-height: 24px; text-align: center; }
  #setup { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 320px; }
  #setup input { padding: 14px; border: 1.5px solid #c7c7cc; border-radius: 12px; font-size: 15px; }
  #setup button { background: #0a84ff; color: white; }
  #main { display: none; flex-direction: column; align-items: center; gap: 16px; width: 100%; }
</style>
</head>
<body>
<h1>📡 Algiz Bot</h1>

<div id="setup">
  <p style="font-size:14px;color:#636366;text-align:center">Введи GitHub токен (один раз)</p>
  <input id="tokenInput" type="password" placeholder="ghp_..." />
  <button onclick="saveToken()">Сохранить</button>
</div>

<div id="main">
  <button class="card" onclick="trigger('card')">📦 Карточка товара</button>
  <button class="editorial" onclick="trigger('editorial')">✍️ Редакционный пост</button>
  <p id="status"></p>
  <button class="reset" onclick="resetToken()">Сменить токен</button>
</div>

<script>
const REPO = 'yusupovildaro-eng/algiz';

function saveToken() {
  const t = document.getElementById('tokenInput').value.trim();
  if (!t.startsWith('ghp_')) { alert('Неверный токен'); return; }
  localStorage.setItem('gh_token', t);
  showMain();
}

function resetToken() {
  localStorage.removeItem('gh_token');
  document.getElementById('setup').style.display = 'flex';
  document.getElementById('main').style.display = 'none';
}

function showMain() {
  document.getElementById('setup').style.display = 'none';
  document.getElementById('main').style.display = 'flex';
}

async function trigger(type) {
  const TOKEN = localStorage.getItem('gh_token');
  const workflow = type === 'card' ? 'post_card.yml' : 'post_editorial.yml';
  const status = document.getElementById('status');
  status.textContent = '⏳ Запускаю...';
  try {
    const res = await fetch(`https://api.github.com/repos/${REPO}/actions/workflows/${workflow}/dispatches`, {
      method: 'POST',
      headers: {
        'Authorization': `token ${TOKEN}`,
        'Accept': 'application/vnd.github.v3+json',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ ref: 'main' })
    });
    status.textContent = res.status === 204 ? '✅ Запущено! Пост выйдет через ~2 мин.' : `❌ Ошибка: ${res.status}`;
  } catch (e) {
    status.textContent = `❌ ${e.message}`;
  }
}

if (localStorage.getItem('gh_token')) showMain();
</script>
</body>
</html>
