name: Post Product Card

on:
  schedule:
    - cron: '0 2 * * *'   # 07:00 Tashkent
    - cron: '0 14 * * *'  # 19:00 Tashkent
  workflow_dispatch:
    inputs:
      source:
        description: 'Source (armas / elina / auto)'
        required: false
        default: 'auto'

concurrency:
  group: algiz-post
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create .env
        run: |
          cat > .env << 'EOF'
          BOT_TOKEN=${{ secrets.BOT_TOKEN }}
          CHANNEL_ID=@algiz_uz
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          SHOP_URL=https://www.armaselektronik.com/tr
          GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO=${{ github.repository }}
          EOF

      - name: Init DB
        run: python -c "from db import init_db; init_db()"

      - name: Post card
        run: |
          SOURCE="${{ github.event.inputs.source }}"
          if [ "$SOURCE" = "auto" ] || [ -z "$SOURCE" ]; then
            python cloud_post.py card
          else
            python -c "
          from db import init_db; init_db()
          from cloud_post import cmd_card
          cmd_card('$SOURCE')
          "
          fi

      - name: Save state
        run: |
          git config user.name "algiz-bot"
          git config user.email "bot@algiz.uz"
          git add data/state.json
          git diff --staged --quiet || (git commit -m "update state [skip ci]" && git pull --rebase && git push)
