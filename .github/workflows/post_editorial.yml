name: Post Editorial

on:
  workflow_dispatch:
    inputs:
      post_type:
        description: 'Type (review / tips / compare / digest / auto)'
        required: false
        default: 'auto'

concurrency:
  group: algiz-post
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create .env
        run: |
          cat > .env << 'EOF'
          BOT_TOKEN=${{ secrets.BOT_TOKEN }}
          CHANNEL_ID=@algiz_uz
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          SHOP_URL=https://www.armaselektronik.com/tr
          GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO=${{ github.repository }}
          EOF

      - name: Init DB
        run: python -c "from db import init_db; init_db()"

      - name: Post editorial
        run: python cloud_post.py editorial
